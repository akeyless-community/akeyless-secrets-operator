                properties:
                  key:
                    type: string
                  name:
                    type: string
                  namespace:
                    type: string
                  type:
                    description: CAProviderType defines where a CA bundle is loaded
                      from.
                    enum:
                    - Secret
                    - ConfigMap
                    type: string
