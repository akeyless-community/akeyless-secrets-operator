apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  labels:
    secrets.akeyless.io/component: controller
  name: akeylessdynamicsecrets.secrets.akeyless.io
spec:
  group: secrets.akeyless.io
  names:
    categories:
    - akeyless-secrets
    kind: AkeylessDynamicSecret
    listKind: AkeylessDynamicSecretList
    plural: akeylessdynamicsecrets
    shortNames:
    - ads
    singular: akeylessdynamicsecret
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.path
      name: Path
      type: string
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.refreshTime
      name: Last Sync
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: AkeylessDynamicSecret syncs dynamic or rotated Akeyless credentials
          into Kubernetes.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AkeylessDynamicSecretSpec syncs a single dynamic or rotated
              Akeyless item.
            properties:
              path:
                description: Path is the Akeyless item path (dynamic-secret or rotated-secret).
                type: string
              property:
                description: Property extracts a field from JSON payloads returned
                  by Akeyless.
                type: string
              rolloutRestartTargets:
                description: RolloutRestartTargets restart workloads when synced secret
                  data changes.
                items:
                  description: RolloutRestartTarget triggers a rolling restart when
                    synced secret data changes.
                  properties:
                    kind:
                      enum:
                      - Deployment
                      - StatefulSet
                      - DaemonSet
                      type: string
                    name:
                      type: string
                  required:
                  - kind
                  - name
                  type: object
                type: array
              secretKey:
                default: value
                description: SecretKey is the key written in the Kubernetes Secret.
                  Defaults to "value".
                type: string
              storeRef:
                description: SecretStoreRef references an AkeylessSecretStore or ClusterAkeylessSecretStore.
                properties:
                  kind:
                    default: AkeylessSecretStore
                    enum:
                    - AkeylessSecretStore
                    - ClusterAkeylessSecretStore
                    type: string
                  name:
                    type: string
                required:
                - name
                type: object
              syncInterval:
                default: 1m0s
                type: string
              syncPolicy:
                default: OnRemoteChange
                description: SyncPolicy defines when the operator syncs from Akeyless
                  into Kubernetes.
                enum:
                - CreatedOnce
                - Periodic
                - OnSpecChange
                - OnRemoteChange
                - OnWebhook
                type: string
              target:
                description: Target defines the Kubernetes Secret to create or update.
                properties:
                  creationPolicy:
                    description: CreationPolicy defines how the target Secret is created.
                    enum:
                    - Owner
                    - Orphan
                    type: string
                  name:
                    type: string
                  template:
                    description: SecretTemplate defines optional metadata for the
                      managed Secret.
                    properties:
                      metadata:
                        description: TemplateMetadata defines labels and annotations
                          on the target Secret.
                        properties:
                          annotations:
                            additionalProperties:
                              type: string
                            type: object
                          labels:
                            additionalProperties:
                              type: string
                            type: object
                        type: object
                      type:
                        type: string
                    type: object
                type: object
              type:
                default: Dynamic
                description: Type selects dynamic vs rotated secret handling. Defaults
                  to Dynamic.
                enum:
                - Dynamic
                - Rotated
                type: string
            required:
            - path
            - storeRef
            - target
            type: object
          status:
            description: AkeylessDynamicSecretStatus defines observed sync state.
            properties:
              conditions:
                items:
                  description: SecretCondition reports sync readiness.
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      type: string
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
              refreshTime:
                format: date-time
                type: string
              remoteVersions:
                additionalProperties:
                  format: int32
                  type: integer
                type: object
              syncedGeneration:
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
