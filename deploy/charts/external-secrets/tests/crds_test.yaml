suite: test crds
templates:
  - crds/akeylesssecretstore.yaml
tests:
  - it: should match snapshot of default values
    set:
      installCRDs: true
      crds.createAkeylessSecretStore: true
    asserts:
      - matchSnapshot: {}

  - it: should disable conversion webhook
    set:
      installCRDs: true
      crds.createAkeylessSecretStore: true
      crds.conversion.enabled: false
    asserts:
      - isNull:
          path: spec.conversion

  - it: should add annotations
    set:
      installCRDs: true
      crds.createAkeylessSecretStore: true
      crds:
        annotations:
          foo: bar
          baz: bang
    asserts:
      - equal:
          path: metadata.annotations.foo
          value: bar
      - equal:
          path: metadata.annotations.baz
          value: bang
