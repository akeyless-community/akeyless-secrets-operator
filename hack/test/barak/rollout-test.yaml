# Rollout restart test — consumes barak-static-test and restarts when secret data changes.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aso-rollout-test
  namespace: barak
  labels:
    app: aso-rollout-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aso-rollout-test
  template:
    metadata:
      labels:
        app: aso-rollout-test
    spec:
      containers:
        - name: app
          image: nginx:1.27-alpine
          env:
            - name: SECRET1
              valueFrom:
                secretKeyRef:
                  name: barak-static-test
                  key: secret1
          ports:
            - containerPort: 80
---
apiVersion: secrets.akeyless.io/v1alpha1
kind: AkeylessSecret
metadata:
  name: barak-static-test
  namespace: barak
spec:
  storeRef:
    name: barak-store
    kind: AkeylessSecretStore
  syncPolicy: OnRemoteChange
  syncInterval: 30s
  target:
    name: barak-static-test
    creationPolicy: Owner
  rolloutRestartTargets:
    - kind: Deployment
      name: aso-rollout-test
  data:
    - secretKey: secret1
      remoteRef:
        key: /aso/secret1
    - secretKey: secret2
      remoteRef:
        key: /aso/secret2
