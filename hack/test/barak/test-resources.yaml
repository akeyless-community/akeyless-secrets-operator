apiVersion: secrets.akeyless.io/v1alpha1
kind: AkeylessSecretStore
metadata:
  name: barak-store
  namespace: barak
spec:
  # In-cluster gateway (port 8081 = API)
  akeylessGWApiURL: "https://api.akeyless.io"
  ignoreCache: true
  auth:
    secretRef:
      accessID:
        name: akeyless-operator-creds
        key: accessId
      accessType:
        name: akeyless-operator-creds
        key: accessType
      accessTypeParam:
        name: akeyless-operator-creds
        key: accessTypeParam
---
apiVersion: secrets.akeyless.io/v1alpha1
kind: AkeylessSecret
metadata:
  name: barak-static-test
  namespace: barak
spec:
  storeRef:
    name: barak-store
    kind: AkeylessSecretStore
  syncPolicy: OnRemoteChange
  syncInterval: 1m
  target:
    name: barak-static-test
    creationPolicy: Owner
  data:
    - secretKey: secret1
      remoteRef:
        key: /aso/secret1
    - secretKey: secret2
      remoteRef:
        key: /aso/secret2
