name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/akeyless-community/akeyless-secrets-operator
  CHART_OCI: oci://ghcr.io/akeyless-community/charts
  PROVIDER: akeyless

jobs:
  publish:
    name: Publish image and Helm chart
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve release tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${{ github.event.release.tag_name }}"
          fi
          if [ -z "$tag" ]; then
            echo "Release tag is required" >&2
            exit 1
          fi
          chart_version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "chart_version=$chart_version" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.17.3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build operator binaries
        run: |
          ARCH=amd64 make build-amd64
          ARCH=arm64 make build-arm64

      - name: Build and push container image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -f Dockerfile \
            --push \
            -t "${{ env.IMAGE }}:${{ steps.version.outputs.tag }}" \
            -t "${{ env.IMAGE }}:latest" \
            .

      - name: Package Helm chart
        run: |
          make helm.generate
          helm dependency update deploy/charts/external-secrets
          helm package deploy/charts/external-secrets --destination /tmp/chart
          ls -la /tmp/chart

      - name: Push Helm chart to GHCR
        run: |
          helm push /tmp/chart/akeyless-secrets-operator-*.tgz "${{ env.CHART_OCI }}"
