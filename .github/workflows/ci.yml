name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  PROVIDER: akeyless

jobs:
  test-and-build:
    name: test-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Test Akeyless provider
        run: |
          cd providers/v1/akeyless
          go test ./... -race -count=1

      - name: Build operator
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -tags akeyless -o bin/akeyless-secrets-operator main.go

      - name: Verify binary
        run: |
          test -x bin/akeyless-secrets-operator
          file bin/akeyless-secrets-operator
