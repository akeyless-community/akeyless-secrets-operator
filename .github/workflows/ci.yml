name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  PROVIDER: akeyless

jobs:
  test-and-build:
    name: test-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Test Akeyless provider
        run: |
          cd providers/v1/akeyless
          go test ./... -race -count=1

      - name: Build operator
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -tags akeyless -o bin/akeyless-secrets-operator main.go

      - name: Verify binary
        run: |
          test -x bin/akeyless-secrets-operator
          file bin/akeyless-secrets-operator
