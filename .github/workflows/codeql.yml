name: "CodeQL Advanced"

# CodeQL is free for public repositories once the dependency graph is enabled.
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze project
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: read
      actions: read
    steps:
    - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit
    - name: Checkout repository
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        persist-credentials: false
    # Without this, codeql scan builds databases separately for all modules during every run.
    - name: Run go work
      run: make go-work
    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3.29.5
      with:
        languages: go
        build-mode: autobuild
        config-file: ./.github/config/codeql-config.yaml
    - name: Perform CodeQL Analysis
      id: codeql_analyze
      uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3.29.5
      continue-on-error: true
    - name: Report CodeQL availability
      if: steps.codeql_analyze.outcome != 'success'
      run: |
        echo "::warning::CodeQL upload failed. Enable dependency graph and code scanning under Settings → Code security and analysis."
