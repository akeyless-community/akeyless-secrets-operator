# Example Helm values for a namespace-scoped, Akeyless-only operator install.
# Copy and customize before use. See docs/image-publishing.md for build and install steps.
createOperator: true
installCRDs: true

processClusterStore: false
processSecretStore: false
processClusterExternalSecret: false
processClusterPushSecret: false
processPushSecret: false
processLegacyExternalSecret: false
processAkeylessSecret: true
processAkeylessDynamicSecret: true
processAkeylessSecretStore: true
processClusterAkeylessSecretStore: false

scopedRBAC: true
scopedNamespace: my-app

namespaceOverride: my-app

image:
  repository: docker.io/<your-user>/akeyless-secrets-operator
  tag: dev
  pullPolicy: IfNotPresent

akeylessWebhook:
  enabled: false
  port: 8083
  path: /webhook/akeyless
  token: ""

leaderElect: false
concurrent: 1

serviceAccount:
  create: true

rbac:
  create: true
